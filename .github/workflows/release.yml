name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Tests previos al release
    uses: ./.github/workflows/test.yml

  build:
    name: build (${{ matrix.os }})
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6,<7"

      - name: Build executable
        run: |
          pyinstaller --onefile `
            --name tlf `
            --hidden-import src.ui.app `
            --hidden-import src.patterns.text_scanner `
            src/main.py
        shell: pwsh

      - name: Verify executable exists
        shell: pwsh
        run: |
          $os = "${{ matrix.os }}"
          if ($os -match "windows") { $expected = "dist/tlf.exe" }
          else { $expected = "dist/tlf" }
          if (-not (Test-Path $expected)) { throw "Ejecutable no encontrado: $expected" }
          Write-Host "Ejecutable verificado: $expected"

      - name: Rename artifact for OS
        shell: pwsh
        run: |
          $os = "${{ matrix.os }}"
          if ($os -match "ubuntu") {
            Move-Item -Path "dist/tlf" -Destination "dist/tlf-linux" -ErrorAction Stop
          } elseif ($os -match "macos") {
            Move-Item -Path "dist/tlf" -Destination "dist/tlf-macos" -ErrorAction Stop
          } elseif ($os -match "windows") {
            Move-Item -Path "dist/tlf.exe" -Destination "dist/tlf-windows.exe" -ErrorAction Stop
          }
          Write-Host "Artifact renamed successfully for $os"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tlf-${{ runner.os }}
          path: dist/*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## TLF ${{ github.ref_name }}

            Descarga el ejecutable para tu sistema operativo:

            - **Linux**: `tlf-linux`
            - **macOS**: `tlf-macos`
            - **Windows**: `tlf-windows.exe`

            ### Uso

            ```bash
            ./tlf scan "texto con 3001234567"
            ./tlf validate phone 3001234567
            ./tlf ui
            ```
          files: |
            artifacts/**/*
          generate_release_notes: false
